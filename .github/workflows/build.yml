name: Build

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "pages/editor/*.html"
      - "electron/**"
      - "package.json"
      - "modellus.js"
      - "common.css"
      - "pages/editor/editor.css"
      - "libraries/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: "dist/*.dmg"
            release-name: Modellus-mac.dmg
          - os: windows-latest
            artifact: "dist/*.exe"
            release-name: Modellus-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build offline assets
        run: npm run build:offline

      - name: Build app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish never

      - name: Rename artifact to fixed name
        shell: bash
        run: |
          src=$(ls ${{ matrix.artifact }} | head -1)
          dir=$(dirname "$src")
          cp "$src" "$dir/${{ matrix.release-name }}"

      - uses: actions/upload-artifact@v5
        with:
          name: modellus-${{ runner.os }}
          path: dist/${{ matrix.release-name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: modellus-macOS
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: modellus-Windows
          path: artifacts

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          name: Latest Build
          body: "Automatically updated on every push to main."
          prerelease: false
          make_latest: true
          files: |
            artifacts/Modellus-mac.dmg
            artifacts/Modellus-windows.exe
